<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookSphere | Welcome Back</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(45deg, #818cf8, #f472b6);
            border-radius: 50%;
            opacity: 0.3;
            animation: floatParticle 8s infinite;
        }

        @keyframes floatParticle {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-100px) translateX(50px);
                opacity: 0.8;
            }
        }

        .auth-wrapper {
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 10;
        }

        .auth-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: bounce 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .auth-header h2 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .auth-header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            position: relative;
            width: 100%;
        }

        .input-group i:not(.toggle-password) {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.1rem;
            transition: color 0.3s;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            height: 56px;
            padding: 0 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #f8fafc;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s;
            outline: none;
        }

        .input-group input:hover {
            border-color: rgba(129, 140, 248, 0.5);
        }

        .input-group input:focus {
            border-color: #818cf8;
            background: rgba(255, 255, 255, 0.05);
        }

        .input-group:focus-within i:not(.toggle-password) {
            color: #818cf8;
        }

        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.3s;
            z-index: 2;
        }

        .toggle-password:hover {
            color: #818cf8;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #818cf8;
        }

        .forgot-link {
            color: #818cf8;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
        }

        .forgot-link:hover {
            text-decoration: underline;
            color: #f472b6;
        }

        .btn-primary {
            background: linear-gradient(45deg, #818cf8, #c084fc);
            color: white;
            border: none;
            height: 56px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(129, 140, 248, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-primary i {
            transition: transform 0.3s;
        }

        .btn-primary:hover:not(:disabled) i {
            transform: translateX(5px);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-footer p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
            cursor: pointer;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .social-login {
            margin-top: 25px;
            text-align: center;
        }

        .social-login p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 15px;
            position: relative;
        }

        .social-login p::before,
        .social-login p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .social-login p::before {
            left: 0;
        }

        .social-login p::after {
            right: 0;
        }

        .social-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
        }

        .social-btn:hover {
            background: rgba(129, 140, 248, 0.2);
            border-color: #818cf8;
            transform: translateY(-3px);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            animation: slideInRight 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .notification.success {
            background: linear-gradient(45deg, #10b981, #34d399);
        }

        .notification.error {
            background: linear-gradient(45deg, #ef4444, #f87171);
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .btn-primary.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .btn-primary.loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }

            .auth-header h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">📘</div>
                <h2>Welcome Back!</h2>
                <p>Sign in to continue your reading journey</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPass" placeholder="Password" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                </div>

                <div class="form-options">
                    <label class="checkbox-group">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="forgotpassword.html" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p>New to BookSphere? <a href="signup.html">Create Account</a></p>
            </div>

            <div class="social-login">
                <p>Or continue with</p>
                <div class="social-buttons">
                    <button class="social-btn" onclick="socialLogin('google')"><i class="fab fa-google"></i></button>
                    <button class="social-btn" onclick="socialLogin('facebook')"><i class="fab fa-facebook-f"></i></button>
                    <button class="social-btn" onclick="socialLogin('github')"><i class="fab fa-github"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            if (!particlesContainer) return;
            
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 5 + 3) + 's';
                particle.style.animationDelay = (Math.random() * 2) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        function togglePassword() {
            const passwordInput = document.getElementById('loginPass');
            const toggleIcon = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        function socialLogin(provider) {
            showNotification(`Connecting to ${provider}...`, 'success');
            
            setTimeout(() => {
                const demoUser = {
                    name: provider === 'google' ? 'Google User' : 
                          provider === 'facebook' ? 'Facebook User' : 'GitHub User',
                    email: `user@${provider}.com`,
                    pass: 'social-login',
                    genre: 'tech',
                    points: 1250,
                    level: 'Silver Reader',
                    joinDate: new Date().toISOString(),
                    exchanges: 0,
                    sales: 0,
                    booksListed: 0
                };
                
                localStorage.setItem('userData', JSON.stringify(demoUser));
                localStorage.setItem('isLoggedIn', 'true');
                
                showNotification(`Logged in with ${provider}!`, 'success');
                
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1500);
            }, 1000);
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');

            if (!email || !pass) {
                showNotification('Please fill in all fields!', 'error');
                return;
            }

            loginBtn.classList.add('loading');
            loginBtn.innerHTML = '<span>Signing in...</span><i class="fas fa-spinner"></i>';

            const storedUser = localStorage.getItem('userData');
            
            setTimeout(() => {
                if (storedUser) {
                    const user = JSON.parse(storedUser);
                    
                    if (user.email === email && user.pass === pass) {
                        localStorage.setItem('isLoggedIn', 'true');
                        
                        if (rememberMe) {
                            localStorage.setItem('rememberedEmail', email);
                        } else {
                            localStorage.removeItem('rememberedEmail');
                        }
                        
                        showNotification('✅ Login Successful! Welcome back!', 'success');
                        
                        setTimeout(() => {
                            window.location.href = 'home.html';
                        }, 1500);
                    } else {
                        loginBtn.classList.remove('loading');
                        loginBtn.innerHTML = '<span>Sign In</span><i class="fas fa-arrow-right"></i>';
                        showNotification('❌ Invalid email or password!', 'error');
                    }
                } else {
                    loginBtn.classList.remove('loading');
                    loginBtn.innerHTML = '<span>Sign In</span><i class="fas fa-arrow-right"></i>';
                    showNotification('❌ No account found! Please sign up first.', 'error');
                    
                    setTimeout(() => {
                        if (confirm('No account found. Would you like to create one?')) {
                            window.location.href = 'signup.html';
                        }
                    }, 500);
                }
            }, 1000);
        });

        window.addEventListener('load', function() {
            createParticles();
            
            const rememberedEmail = localStorage.getItem('rememberedEmail');
            if (rememberedEmail) {
                document.getElementById('loginEmail').value = rememberedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });

        document.querySelectorAll('.input-group input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
