<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookSphere | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        
        .floating-books {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .book-float {
            position: absolute;
            font-size: 4rem;
            opacity: 0.1;
            animation: float 6s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        .book-float:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .book-float:nth-child(2) { top: 20%; right: 5%; animation-delay: -2s; }
        .book-float:nth-child(3) { bottom: 15%; left: 10%; animation-delay: -4s; }
        .book-float:nth-child(4) { bottom: 20%; right: 10%; animation-delay: -1s; }

        
        .auth-wrapper {
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 10;
        }

        .auth-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: bounce 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .auth-header h2 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .auth-header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

       
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        
        .input-group {
            position: relative;
            width: 100%;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.1rem;
            transition: color 0.3s;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            height: 56px;
            padding: 0 20px 0 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: #f8fafc;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.3s;
            outline: none;
        }

        .input-group input:hover {
            border-color: rgba(129, 140, 248, 0.5);
        }

        .input-group input:focus {
            border-color: #818cf8;
            background: rgba(255, 255, 255, 0.05);
        }

        .input-group:focus-within i {
            color: #818cf8;
        }

       
        .password-strength {
            margin-top: 5px;
            font-size: 0.8rem;
        }

        .strength-text {
            color: #94a3b8;
        }

        .strength-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0;
            transition: all 0.3s;
        }

        .strength-fill.weak {
            width: 33%;
            background: #ef4444;
        }

        .strength-fill.medium {
            width: 66%;
            background: #f59e0b;
        }

        .strength-fill.strong {
            width: 100%;
            background: #10b981;
        }

        
        .btn-primary {
            background: linear-gradient(45deg, #818cf8, #c084fc);
            color: white;
            border: none;
            height: 56px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(129, 140, 248, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-primary i {
            transition: transform 0.3s;
        }

        .btn-primary:hover:not(:disabled) i {
            transform: translateX(5px);
        }

       
        .back-to-login {
            text-align: center;
            margin-top: 25px;
        }

        .back-to-login a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-to-login a:hover {
            color: #818cf8;
        }

    
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            animation: slideInRight 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .notification.success {
            background: linear-gradient(45deg, #10b981, #34d399);
        }

        .notification.error {
            background: linear-gradient(45deg, #ef4444, #f87171);
        }

        .notification.info {
            background: linear-gradient(45deg, #3b82f6, #60a5fa);
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .btn-primary.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .btn-primary.loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .message-box {
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.3);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .message-box i {
            font-size: 1.5rem;
            color: #818cf8;
        }

        .message-box p {
            color: #f8fafc;
            font-size: 0.9rem;
            line-height: 1.5;
        }

       
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }

            .auth-header h2 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
   
    <div class="floating-books">
        <div class="book-float">📚</div>
        <div class="book-float">📖</div>
        <div class="book-float">📘</div>
        <div class="book-float">📕</div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
           
            <div class="auth-header">
                <div class="auth-logo">📘</div>
                <h2>Reset Password</h2>
                <p>Enter your email and new password</p>
            </div>

           
            <div class="message-box">
                <i class="fas fa-info-circle"></i>
                <p>Enter the email associated with your account and create a new password.</p>
            </div>

            
            <form id="resetPasswordForm" class="auth-form">
                
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="resetEmail" placeholder="Enter your email address" required>
                </div>

                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="newPassword" placeholder="New Password" required onkeyup="checkPasswordStrength()">
                </div>

                <div class="password-strength">
                    <span class="strength-text" id="strengthText">Password strength</span>
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
                </div>

                <button type="submit" class="btn-primary" id="resetBtn">
                    <span>Reset Password</span>
                    <i class="fas fa-save"></i>
                </button>
            </form>

            <div class="back-to-login">
                <a href="login.html">
                    <i class="fas fa-arrow-left"></i>
                    Back to Login
                </a>
            </div>
        </div>
    </div>

    <script>

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');
            
            strengthFill.classList.remove('weak', 'medium', 'strong');
            
            if (password.length === 0) {
                strengthFill.style.width = '0';
                strengthText.textContent = 'Password strength';
                return;
            }
            
            let strength = 0;
            
           
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
          
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            
            if (password.length < 6) {
                strengthFill.classList.add('weak');
                strengthText.textContent = 'Too short';
            } else if (strength <= 2) {
                strengthFill.classList.add('weak');
                strengthText.textContent = 'Weak password';
            } else if (strength <= 4) {
                strengthFill.classList.add('medium');
                strengthText.textContent = 'Medium password';
            } else {
                strengthFill.classList.add('strong');
                strengthText.textContent = 'Strong password';
            }
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('resetEmail').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');

            if (!email || !newPass || !confirmPass) {
                showNotification('Please fill in all fields!', 'error');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showNotification('Please enter a valid email address!', 'error');
                return;
            }

            if (newPass.length < 6) {
                showNotification('Password must be at least 6 characters!', 'error');
                return;
            }

           
            if (newPass !== confirmPass) {
                showNotification('Passwords do not match!', 'error');
                return;
            }

            resetBtn.classList.add('loading');
            resetBtn.innerHTML = '<span>Resetting Password...</span><i class="fas fa-spinner"></i>';

            setTimeout(() => {
                const userData = localStorage.getItem('userData');
                
                if (userData) {
                    const user = JSON.parse(userData);
                    
                    if (user.email === email) {
                        
                        user.pass = newPass;
                        localStorage.setItem('userData', JSON.stringify(user));
                        
                        showNotification('✅ Password reset successful! Redirecting to login...', 'success');
                        
                       
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        
                        resetBtn.classList.remove('loading');
                        resetBtn.innerHTML = '<span>Reset Password</span><i class="fas fa-save"></i>';
                        
                        showNotification('❌ Email not found! Please check and try again.', 'error');
                        
                        
                        setTimeout(() => {
                            if (confirm('Email not found. Would you like to create a new account?')) {
                                window.location.href = 'signup.html';
                            }
                        }, 500);
                    }
                } else {
                    
                    resetBtn.classList.remove('loading');
                    resetBtn.innerHTML = '<span>Reset Password</span><i class="fas fa-save"></i>';
                    
                    showNotification('❌ No account found! Please sign up first.', 'error');
                    
                    setTimeout(() => {
                        if (confirm('No account found. Would you like to create one?')) {
                            window.location.href = 'signup.html';
                        }
                    }, 500);
                }
            }, 1500);
        });

        document.querySelectorAll('.input-group input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });

        document.querySelector('.back-to-login a').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
